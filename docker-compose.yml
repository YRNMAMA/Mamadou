#version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: sio-postgres
    environment:
      POSTGRES_USER: sio_user
      POSTGRES_PASSWORD: sio_password
      POSTGRES_DB: sio_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: sio-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: sio_user
      DB_PASS: sio_password
      DB_NAME: sio_db
      JWT_SECRET: "chiave_segreta_super_sicura_per_il_corso_segretissimissima"
      AUTH_ENABLED: "false"
    depends_on:
      - db
    restart: always

  fe-sio:
    build:
      context: ./his-afp
      dockerfile: Dockerfile
    image: his-afp:${SVI_VERSION:-latest}
    ports:
      - "8999:80"

  fe-prod:
    build:
      context: ./his-afp
      dockerfile: Dockerfile
    image: his-afp:${PROD_VERSION:-latest}
    container_name: fe-prod
    ports:
      - "80:80"

  fe-test:
    build:
      context: ./his-afp
      dockerfile: Dockerfile
    image: his-afp:${TEST_VERSION:-latest}
    container_name: fe-TEST
    ports:
      - "8080:80"

volumes:
  pg_data:
